<!doctype html>
<!--
  ═══════════════════════════════════════════════════════════════════════════
  IMPLEMENTATION NOTE FOR ENGINEERING
  ═══════════════════════════════════════════════════════════════════════════
  This mockup is rendered with Polaris React (@shopify/polaris) for design
  fidelity in a standalone preview.

  When implementing the actual Shopify admin embedded app, use Polaris Web
  Components (https://shopify.dev/docs/api/app-home/web-components) instead.
  They are the recommended path for embedded admin apps and inherit Shopify's
  live design tokens automatically.

  Component mapping (React → Web Component):
    <Page>            → <s-page heading slot="primary-action" slot="secondary-actions">
    <Card>/<Section>  → <s-section heading>
    <BlockStack>      → <s-stack direction="block" gap>
    <InlineStack>     → <s-stack direction="inline" gap>
    <Grid>            → <s-grid grid-template-columns gap>
    <DataTable>       → <s-table> + <s-table-header-row>/<s-table-header
                                       list-slot format>/<s-table-body>/
                                       <s-table-row click-delegate>/<s-table-cell>
    <Button>          → <s-button variant="primary|secondary">
    <Badge>           → <s-badge tone="info|success|warning|critical|neutral">
    <Banner>          → <s-banner tone heading>
    <TextField>       → <s-text-field label value>
    <Select>          → <s-select label> + plain <option>
    <Checkbox>        → <s-checkbox label checked>
    <Text>            → <s-text type="strong|subdued">
    <Heading>         → <s-heading>
    <Link>            → <s-link href>
    <Divider>         → <s-divider>
    Tabs (Polaris)    → No s-tabs exists. Build a custom tab strip OR pivot
                        to multiple admin nav items (preferred).
  ═══════════════════════════════════════════════════════════════════════════
-->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Supercharge — Quote App Admin</title>
<link rel="stylesheet" href="https://unpkg.com/@shopify/polaris@13.9.5/build/esm/styles.css"/>
<link rel="stylesheet" href="tokens-overlay.css"/>
</head>
<body>
<div id="root"></div>

<script type="module">
  // Pre-load ESM deps and stash on window so Babel-compiled code can use them
  const [reactMod, rdomMod, rdomClientMod, polarisMod, iconsMod, en] = await Promise.all([
    import('https://esm.sh/react@18.3.1'),
    import('https://esm.sh/react-dom@18.3.1'),
    import('https://esm.sh/react-dom@18.3.1/client'),
    import('https://esm.sh/@shopify/polaris@13.9.5?deps=react@18.3.1,react-dom@18.3.1'),
    import('https://esm.sh/@shopify/polaris-icons@9.3.0?deps=react@18.3.1'),
    fetch('https://esm.sh/@shopify/polaris@13.9.5/locales/en.json').then(r => r.json()),
  ]);
  window.React = reactMod.default || reactMod;
  window.ReactDOM = rdomMod.default || rdomMod;
  window.ReactDOMClient = rdomClientMod;
  window.Polaris = polarisMod;
  window.PolarisIcons = iconsMod;
  window.enTranslations = en;
  // Load Babel + app
  await new Promise(res => { const s = document.createElement('script'); s.src = 'https://unpkg.com/@babel/standalone@7.29.0/babel.min.js'; s.onload = res; document.head.appendChild(s); });
  const appCode = document.getElementById('app-code').textContent;
  const out = Babel.transform(appCode, { presets: ['react'] }).code;
  const tag = document.createElement('script');
  tag.textContent = out;
  document.body.appendChild(tag);
</script>

<script type="text/plain" id="app-code">
const { useState, useMemo, useCallback } = React;
const { createRoot } = ReactDOMClient;
const {
  AppProvider, Frame, TopBar, Navigation, Page, Layout, Card, BlockStack, InlineStack,
  InlineGrid, Box, Text, Button, ButtonGroup, Badge, Banner, Divider, TextField, Select,
  Checkbox, ChoiceList, FormLayout, IndexTable, IndexFilters, useIndexResourceState,
  Tabs, Bleed, Tooltip, Icon, RangeSlider, ProgressBar, Modal, Tag, Link, Collapsible
} = Polaris;
const PIcon = Icon;
const {
  HomeIcon, OrderIcon, PageIcon, SettingsIcon, NotificationIcon, StoreIcon, EditIcon,
  DeleteIcon, ViewIcon, EmailIcon, DuplicateIcon, ArrowDownIcon, PlusIcon, SearchIcon,
  PersonIcon, CalendarIcon, ChevronRightIcon, ChevronDownIcon, RefreshIcon
} = PolarisIcons;

// ───── helpers ─────
const monoStyle = { fontFamily: 'var(--p-font-family-mono)' };
const Mono = ({ children, variant = 'bodyMd' }) => (
  <Text as="span" variant={variant}><span style={monoStyle}>{children}</span></Text>
);
const fmt$ = (n) => '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = (d) => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

// ───── fixtures ─────
const QUOTES = [
  { id: 'D2895', title: 'Q4 facility expansion — wiring kit', customer: 'James Rodriguez', company: 'Atlas Industries', status: 'open', created: '2026-04-22', expires: '2026-07-21', total: 28381.50, items: 24, owner: 'Morgan Ellis' },
  { id: 'D2894', title: 'Spring panel restock', customer: 'Sarah Kim', company: 'Redline Supply Co', status: 'completed', created: '2026-04-19', expires: '2026-07-18', total: 12480.00, items: 8, owner: 'Priya Shah' },
  { id: 'D2893', title: 'Substation upgrade — Phase II', customer: 'Tom Nguyen', company: 'Greenfield Mfg', status: 'open', created: '2026-04-18', expires: '2026-07-17', total: 84200.00, items: 42, owner: 'Morgan Ellis' },
  { id: 'D2892', title: 'Tooling refresh Q2', customer: 'Lisa Park', company: 'Pacific Wholesale', status: 'pending', created: '2026-04-15', expires: '2026-07-14', total: 4892.25, items: 12, owner: 'Jordan Park' },
  { id: 'D2891', title: 'Bus bar replacements', customer: 'David Chen', company: 'Summit Electric', status: 'expired', created: '2026-01-12', expires: '2026-04-12', total: 18750.00, items: 6, owner: 'Priya Shah' },
  { id: 'D2890', title: 'Junction boxes — annual order', customer: 'James Rodriguez', company: 'Atlas Industries', status: 'completed', created: '2026-01-08', expires: '2026-04-08', total: 6320.75, items: 18, owner: 'Morgan Ellis' },
];
const SF_QUOTES = [
  { id: 'D2895', title: 'Q4 facility expansion', date: 'Apr 22, 2026', status: 'open', total: 28381.50, items: 24 },
  { id: 'D2890', title: 'Junction boxes annual', date: 'Jan 8, 2026', status: 'completed', total: 6320.75, items: 18 },
  { id: 'D2891', title: 'Bus bar replacements', date: 'Jan 12, 2026', status: 'expired', total: 18750.00, items: 6 },
  { id: 'D2880', title: 'Warehouse retrofit', date: 'Dec 18, 2025', status: 'open', total: 11240.00, items: 32 },
];
const STATUS_TONE = { open: 'info', completed: 'success', pending: 'warning', expired: undefined };

// ───── Frame chrome (TopBar + Navigation) ─────
function useShell() {
  const [userMenuOpen, setUserMenuOpen] = useState(false);
  const userMenu = (
    <TopBar.UserMenu
      actions={[{ items: [{ content: 'Account' }, { content: 'Sign out' }] }]}
      name="James Rodriguez"
      detail="Atlas Industries"
      initials="JR"
      open={userMenuOpen}
      onToggle={() => setUserMenuOpen(o => !o)}
    />
  );
  const topBar = <TopBar showNavigationToggle userMenu={userMenu} />;
  return { topBar };
}

const NavSidebar = ({ page, onNav }) => (
  <Navigation location="/">
    <Navigation.Section
      title="B2B Supercharge"
      items={[
        { label: 'Dashboard', icon: HomeIcon, selected: page === 'dashboard', onClick: () => onNav('dashboard') },
        { label: 'Quotes', icon: OrderIcon, selected: page === 'quotes' || page === 'quote-detail', badge: '6', onClick: () => onNav('quotes') },
        { label: 'Companies', icon: StoreIcon, onClick: () => onNav('companies') },
      ]}
    />
    <Navigation.Section
      title="Settings"
      separator
      items={[
        { label: 'Quote list', icon: PageIcon, selected: page === 'list-settings', onClick: () => onNav('list-settings') },
        { label: 'Quote PDF', icon: PageIcon, selected: page === 'pdf-settings', onClick: () => onNav('pdf-settings') },
        { label: 'General', icon: SettingsIcon, onClick: () => onNav('general') },
      ]}
    />

);

// ───── Quotes Dashboard (IndexTable) ─────
function QuotesDashboard({ onOpenQuote }) {
  const resourceName = { singular: 'quote', plural: 'quotes' };
  const { selectedResources, allResourcesSelected, handleSelectionChange } =
    useIndexResourceState(QUOTES);

  const [tab, setTab] = useState(0);
  const [query, setQuery] = useState('');
  const [sort, setSort] = useState('date_desc');

  const tabs = [
    { id: 'all', content: 'All', filter: () => true },
    { id: 'open', content: 'Open', filter: q => q.status === 'open' },
    { id: 'pending', content: 'Pending', filter: q => q.status === 'pending' },
    { id: 'completed', content: 'Completed', filter: q => q.status === 'completed' },
    { id: 'expired', content: 'Expired', filter: q => q.status === 'expired' },
  ].map(t => ({ ...t, badge: String(QUOTES.filter(t.filter).length) }));

  const filtered = useMemo(() => {
    let r = QUOTES.filter(tabs[tab].filter);
    if (query) r = r.filter(q =>
      q.id.toLowerCase().includes(query.toLowerCase()) ||
      q.title.toLowerCase().includes(query.toLowerCase()) ||
      q.company.toLowerCase().includes(query.toLowerCase())
    );
    return r;
  }, [tab, query]);

  const rows = filtered.map((q, index) => (
    <IndexTable.Row id={q.id} key={q.id} position={index} selected={selectedResources.includes(q.id)} onClick={() => onOpenQuote(q)}>
      <IndexTable.Cell><Mono>#{q.id}</Mono></IndexTable.Cell>
      <IndexTable.Cell><Text variant="bodyMd" fontWeight="medium">{q.title}</Text></IndexTable.Cell>
      <IndexTable.Cell>
        <BlockStack gap="050">
          <Text variant="bodyMd">{q.company}</Text>
          <Text variant="bodySm" tone="subdued">{q.customer}</Text>
        </BlockStack>
      </IndexTable.Cell>
      <IndexTable.Cell><Badge tone={STATUS_TONE[q.status]}>{q.status}</Badge></IndexTable.Cell>
      <IndexTable.Cell><Mono variant="bodySm">{fmtDate(q.created)}</Mono></IndexTable.Cell>
      <IndexTable.Cell><Mono variant="bodySm">{fmtDate(q.expires)}</Mono></IndexTable.Cell>
      <IndexTable.Cell><Text alignment="end" numeric><Mono>{q.items}</Mono></Text></IndexTable.Cell>
      <IndexTable.Cell><Text alignment="end" numeric><Mono>{fmt$(q.total)}</Mono></Text></IndexTable.Cell>
      <IndexTable.Cell><Text variant="bodySm">{q.owner}</Text></IndexTable.Cell>
    </IndexTable.Row>
  ));

  const sortOptions = [
    { label: 'Newest first', value: 'date_desc' },
    { label: 'Oldest first', value: 'date_asc' },
    { label: 'Highest total', value: 'total_desc' },
    { label: 'Quote # descending', value: 'number_desc' },
  ];

  return (
    <Page
      title="Quotes"
      subtitle="Review, send, and convert quotes across all B2B companies."
      titleMetadata={<Badge tone="info">6 active</Badge>}
      primaryAction={{ content: 'Create quote', icon: PlusIcon }}
      secondaryActions={[{ content: 'Export', icon: ArrowDownIcon }]}
    >
      <Layout>
        <Layout.Section>
          <InlineGrid columns={{ xs: 2, md: 4 }} gap="400">
            {[
              { label: 'Total quotes', value: '6', delta: '↑ 12% vs last month', tone: 'success' },
              { label: 'Open volume', value: fmt$(QUOTES.filter(q=>q.status==='open').reduce((s,q)=>s+q.total,0)), delta: '↑ 8.4%', tone: 'success' },
              { label: 'Avg. cycle time', value: '4.2d', delta: '↓ 0.6d', tone: 'success' },
              { label: 'Conversion rate', value: '68%', delta: '↑ 4 pts', tone: 'success' },
            ].map(s => (
              <Card key={s.label}>
                <BlockStack gap="100">
                  <Text variant="bodySm" tone="subdued">{s.label}</Text>
                  <Mono variant="headingLg">{s.value}</Mono>
                  <Text variant="bodySm" tone={s.tone}>{s.delta}</Text>
                </BlockStack>
              </Card>
            ))}
          </InlineGrid>
        </Layout.Section>

        <Layout.Section>
          <Card padding="0">
            <IndexFilters
              sortOptions={sortOptions}
              sortSelected={[sort]}
              queryValue={query}
              queryPlaceholder="Search quote number, title, or company"
              onQueryChange={setQuery}
              onQueryClear={() => setQuery('')}
              onSort={(v) => setSort(v[0])}
              cancelAction={{ onAction: () => {}, disabled: false, loading: false }}
              tabs={tabs}
              selected={tab}
              onSelect={setTab}
              canCreateNewView
              onCreateNewView={async () => true}
              filters={[]}
              appliedFilters={[]}
              onClearAll={() => {}}
              mode="DEFAULT"
              setMode={() => {}}
            />
            <IndexTable
              condensed={false}
              resourceName={resourceName}
              itemCount={filtered.length}
              selectedItemsCount={allResourcesSelected ? 'All' : selectedResources.length}
              onSelectionChange={handleSelectionChange}
              promotedBulkActions={[
                { content: 'Send', onAction: () => {} },
                { content: 'Email PDF', onAction: () => {} },
                { content: 'Archive', onAction: () => {} },
              ]}
              bulkActions={[{ content: 'Delete', onAction: () => {} }]}
              headings={[
                { title: 'Quote #' },
                { title: 'Title' },
                { title: 'Company' },
                { title: 'Status' },
                { title: 'Created' },
                { title: 'Expires' },
                { title: 'Items', alignment: 'end' },
                { title: 'Total', alignment: 'end' },
                { title: 'Owner' },
              ]}
            >
              {rows}
            </IndexTable>
          </Card>
        </Layout.Section>
      </Layout>
    </Page>
  );
}

// ───── Quote Detail ─────
function QuoteDetail({ quote, onBack }) {
  const q = quote || QUOTES[0];
  const items = [
    { sku: 'GM-3000-COIL', desc: 'Industrial Cable 12AWG, 1000ft spool', msrp: 489.00, price: 412.50, qty: 12, uom: 'Spool' },
    { sku: 'GM-PANEL-24C', desc: '24-Circuit Panel, NEMA 3R', msrp: 1284.00, price: 1098.00, qty: 4, uom: 'Ea' },
    { sku: 'PW-EMT-34', desc: 'Conduit EMT 3/4" × 10ft', msrp: 18.40, price: 14.75, qty: 200, uom: 'Stick' },
    { sku: 'SE-JB-6X6', desc: 'Junction Box 6×6", weatherproof', msrp: 64.50, price: 52.00, qty: 24, uom: 'Ea' },
  ];
  const subtotal = items.reduce((s, l) => s + l.price * l.qty, 0);
  const shipping = 425;
  const tax = subtotal * 0.0825;
  const total = subtotal + shipping + tax;

  const itemRows = items.map((l, i) => (
    <IndexTable.Row id={l.sku} key={l.sku} position={i}>
      <IndexTable.Cell><Mono variant="bodySm">{l.sku}</Mono></IndexTable.Cell>
      <IndexTable.Cell><Text>{l.desc}</Text></IndexTable.Cell>
      <IndexTable.Cell><Text alignment="end" numeric><Mono>{fmt$(l.msrp)}</Mono></Text></IndexTable.Cell>
      <IndexTable.Cell><Text alignment="end" numeric><Mono>{fmt$(l.price)}</Mono></Text></IndexTable.Cell>
      <IndexTable.Cell><Text alignment="end" numeric><Mono>{l.qty}</Mono></Text></IndexTable.Cell>
      <IndexTable.Cell><Text>{l.uom}</Text></IndexTable.Cell>
      <IndexTable.Cell><Text alignment="end" numeric><Mono>{fmt$(l.price * l.qty)}</Mono></Text></IndexTable.Cell>
    </IndexTable.Row>
  ));

  return (
    <Page
      backAction={{ content: 'Quotes', onAction: onBack }}
      title={`#${q.id}`}
      titleMetadata={<InlineStack gap="200"><Badge tone={STATUS_TONE[q.status]}>{q.status}</Badge></InlineStack>}
      subtitle={q.title}
      primaryAction={{ content: 'Send to buyer' }}
      secondaryActions={[
        { content: 'Email quote', icon: EmailIcon },
        { content: 'Download PDF', icon: ArrowDownIcon },
        { content: 'Duplicate', icon: DuplicateIcon },
      ]}
    >
      <Layout>
        <Layout.Section>
          <Card padding="0">
            <Box padding="400" borderBlockEndWidth="025" borderColor="border">
              <InlineStack align="space-between" blockAlign="center">
                <BlockStack gap="050">
                  <Text variant="headingSm">Line items</Text>
                  <Text variant="bodySm" tone="subdued">{items.length} items · {items.reduce((s,l)=>s+l.qty,0)} units</Text>
                </BlockStack>
                <Button icon={EditIcon}>Edit items</Button>
              </InlineStack>
            </Box>
            <IndexTable
              resourceName={{ singular: 'item', plural: 'items' }}
              itemCount={items.length}
              selectable={false}
              headings={[
                { title: 'SKU' },
                { title: 'Description' },
                { title: 'MSRP', alignment: 'end' },
                { title: 'Your price', alignment: 'end' },
                { title: 'Qty', alignment: 'end' },
                { title: 'UOM' },
                { title: 'Ext. price', alignment: 'end' },
              ]}
            >
              {itemRows}
            </IndexTable>
            <Box padding="400">
              <InlineStack align="end">
                <Box minWidth="280px">
                  <BlockStack gap="100">
                    <InlineStack align="space-between"><Text tone="subdued">Subtotal</Text><Mono>{fmt$(subtotal)}</Mono></InlineStack>
                    <InlineStack align="space-between"><Text tone="subdued">Estimated shipping</Text><Mono>{fmt$(shipping)}</Mono></InlineStack>
                    <InlineStack align="space-between"><Text tone="subdued">Tax (8.25%)</Text><Mono>{fmt$(tax)}</Mono></InlineStack>
                    <Divider />
                    <InlineStack align="space-between">
                      <Text fontWeight="semibold">Total</Text>
                      <Mono variant="headingMd">{fmt$(total)}</Mono>
                    </InlineStack>
                  </BlockStack>
                </Box>
              </InlineStack>
            </Box>
          </Card>

          <Box paddingBlockStart="400">
            <Card>
              <BlockStack gap="300">
                <Text variant="headingSm">Activity</Text>
                <BlockStack gap="200">
                  {[
                    { when: '2 hours ago', body: 'Sent reminder email to James Rodriguez', who: 'Morgan Ellis' },
                    { when: 'Yesterday, 4:12 PM', body: 'Updated GM-PANEL-24C qty from 2 → 4', who: 'Morgan Ellis' },
                    { when: '3 days ago', body: 'Approved by VP Operations', who: 'System' },
                    { when: '4 days ago', body: 'Quote sent to buyer', who: 'Morgan Ellis' },
                    { when: '5 days ago', body: 'Quote created from cart', who: 'James Rodriguez' },
                  ].map((e, i) => (
                    <Box key={i} paddingBlock="200" borderBlockStartWidth={i ? '025' : '0'} borderColor="border">
                      <Text>{e.body}</Text>
                      <Text variant="bodySm" tone="subdued">{e.when} · {e.who}</Text>
                    </Box>
                  ))}
                </BlockStack>
              </BlockStack>
            </Card>
          </Box>
        </Layout.Section>

        <Layout.Section variant="oneThird">
          <BlockStack gap="400">
            <Card>
              <BlockStack gap="200">
                <Text variant="headingSm">Buyer</Text>
                <Text fontWeight="medium">{q.customer}</Text>
                <Text tone="subdued">{q.company}</Text>
                <Link url="#">j.rodriguez@atlasind.com</Link>
                <Text tone="subdued"><Mono variant="bodySm">+1 (713) 555-0188</Mono></Text>
              </BlockStack>
            </Card>
            <Card>
              <BlockStack gap="200">
                <Text variant="headingSm">Quote details</Text>
                <InlineStack align="space-between"><Text tone="subdued">Quote number</Text><Mono>#{q.id}</Mono></InlineStack>
                <InlineStack align="space-between"><Text tone="subdued">Created</Text><Mono variant="bodySm">{fmtDate(q.created)}</Mono></InlineStack>
                <InlineStack align="space-between"><Text tone="subdued">Expires</Text><Mono variant="bodySm">{fmtDate(q.expires)}</Mono></InlineStack>
                <InlineStack align="space-between"><Text tone="subdued">Payment terms</Text><Text>Net 45</Text></InlineStack>
                <InlineStack align="space-between"><Text tone="subdued">Owner</Text><Text>{q.owner}</Text></InlineStack>
              </BlockStack>
            </Card>
            <Card>
              <BlockStack gap="200">
                <Text variant="headingSm">Approvals</Text>
                <InlineStack align="space-between" blockAlign="center"><Text>VP Operations</Text><Badge tone="success">Approved</Badge></InlineStack>

              </BlockStack>

        </Layout.Section>
      </Layout>

}

// ───── List Settings ─────
const DEFAULT_LIST = {
  page_title: 'Your Saved Quotes',
  page_title_size: 'xl',
  show_subtitle: true,
  subtitle_text: 'Review and manage your saved quotes.',
  show_create_quote_button: true,
  create_quote_button_label: 'Request a quote',
  columns: [
    { key: 'number', visible: true, label: 'Quote Number' },
    { key: 'title', visible: true, label: 'Quote Title' },
    { key: 'date_created', visible: true, label: 'Date Created' },
    { key: 'status', visible: true, label: 'Status' },
    { key: 'total', visible: true, label: 'Total' },
    { key: 'item_count', visible: false, label: 'Items' },
  ],
  header_bg: '#5B6770',
  header_text: '#FFFFFF',
  row_density: 'comfortable',
  zebra_striping: false,
  border_radius: 'md',
  show_search: true,
  show_status_filter: true,
  show_sort_dropdown: true,
  pagination_style: 'numbered',
};
const TITLE_PX = { lg: '24px', xl: '32px', '2xl': '40px', '3xl': '48px' };
const DENS_PX = { compact: '8px', comfortable: '14px', spacious: '20px' };
const RAD_PX = { none: '0', sm: '4px', md: '8px', lg: '14px' };

function StorefrontPreview({ s }) {
  const cols = s.columns.filter(c => c.visible);
  return (
    <div className="sf" style={{
      '--sf-title-size': TITLE_PX[s.page_title_size],
      '--sf-header-bg': s.header_bg,
      '--sf-header-text': s.header_text,
      '--sf-density': DENS_PX[s.row_density],
      '--sf-radius': RAD_PX[s.border_radius],
    }}>
      <div className="sf-page">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 16 }}>
          <div>
            <h1 className="sf-title">{s.page_title}</h1>
            {s.show_subtitle && <p className="sf-subtitle">{s.subtitle_text}</p>}
          </div>
          {s.show_create_quote_button && <a href="#" className="sf-cta">{s.create_quote_button_label}</a>}
        </div>
        {(s.show_search || s.show_status_filter || s.show_sort_dropdown) && (
          <div className="sf-toolbar">
            {s.show_search && <input className="sf-search" placeholder="Search quotes…"/>}
            {s.show_status_filter && <select className="sf-select"><option>All statuses</option><option>Open</option><option>Completed</option></select>}
            {s.show_sort_dropdown && <select className="sf-select"><option>Newest first</option><option>Oldest first</option></select>}
          </div>
        )}
        <table className={`sf-table ${s.zebra_striping ? 'sf-zebra' : ''}`}>
          <thead><tr>{cols.map(c => <th key={c.key}>{c.label}</th>)}<th style={{ width: 50 }}></th></tr></thead>
          <tbody>
            {SF_QUOTES.map(q => (
              <tr key={q.id}>
                {cols.map(c => {
                  if (c.key === 'number') return <td key="n" style={monoStyle}>#{q.id}</td>;
                  if (c.key === 'title') return <td key="t">{q.title}</td>;
                  if (c.key === 'date_created') return <td key="d" style={monoStyle}>{q.date}</td>;
                  if (c.key === 'status') return <td key="s"><span className={`sf-status sf-status--${q.status}`}>{q.status}</span></td>;
                  if (c.key === 'total') return <td key="$" style={{ ...monoStyle, textAlign: 'right' }}>{fmt$(q.total)}</td>;
                  if (c.key === 'item_count') return <td key="i" style={{ textAlign: 'right' }}>{q.items}</td>;
                  return <td key={c.key}>—</td>;
                })}
                <td style={{ textAlign: 'right' }}><span style={{ cursor: 'pointer', color: '#555' }}>⋯</span></td>
              </tr>
            ))}
          </tbody>
        </table>
        {s.pagination_style === 'numbered' && (
          <div className="sf-pagination"><span className="pn">‹</span><span className="pn active">1</span><span className="pn">2</span><span className="pn">3</span><span className="pn">›</span></div>
        )}
        {s.pagination_style === 'cursor' && (
          <div className="sf-pagination"><span className="pn">‹ Previous</span><span className="pn">Next ›</span></div>
        )}
        {s.pagination_style === 'load_more' && (
          <div style={{ textAlign: 'center', marginTop: 20 }}><a href="#" className="sf-cta" style={{ background: '#fff', color: '#1a1a1a', border: '1px solid #d4d4d8' }}>Load more</a></div>
        )}
      </div>
    </div>
  );
}

function CollapsibleCard({ id, title, description, defaultOpen, children }) {
  const [open, setOpen] = useState(Boolean(defaultOpen));
  return (
    <Card padding="0">
      <Box padding="400">
        <button
          type="button"
          onClick={() => setOpen(o => !o)}
          aria-expanded={open}
          aria-controls={`collapsible-${id}`}
          style={{ background: 'transparent', border: 0, padding: 0, margin: 0, width: '100%', cursor: 'pointer', textAlign: 'left', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '12px' }}

          <Icon source={open ? ChevronDownIcon : ChevronRightIcon} tone="subdued" />

      </Box>
      <Collapsible id={`collapsible-${id}`} open={open} transition={{ duration: '200ms', timingFunction: 'ease-in-out' }} expandOnPrint>
        <Box paddingInline="400" paddingBlockEnd="400">

// ───── Tabbed feature page (Polaris Tabs inside Page) ─────
function TabbedPage({ entry, activeTab, onTab, ctx }) {
  const labelOf = (id) => entry.tabs.find(t => t.id === id)?.label || id;
  const tabs = entry.tabs.map(t => ({ id: t.id, content: t.label, panelID: `panel-${t.id}` }));
  const selectedIdx = Math.max(0, entry.tabs.findIndex(t => t.id === activeTab));

  return (
    <Page title={entry.label}>
      <Layout>
        <Layout.Section>
          <Card padding="0">
            <Tabs tabs={tabs} selected={selectedIdx} onSelect={(i) => onTab(entry.tabs[i].id)} />
            <div style={{ borderTop: '1px solid var(--p-color-border)' }}>
              {renderFeaturePage(activeTab, ctx)}
            </div>
          </Card>
        </Layout.Section>
      </Layout>
    </Page>
  );
}

// ───── Root ─────
function App() {
  const ia = PATTERN_1;
  const [rootId, setRootId] = useState('quotes');
  const [tabId, setTabId] = useState('all');
  const [quote, setQuote] = useState(null);

  const navRoot = (id) => {
    setRootId(id);
    const entry = ia.find(x => x.id === id);
    setTabId(entry?.tabs?.[0]?.id || id);
    setQuote(null);
  };

  const ctx = { onOpenQuote: (q) => { setQuote(q); } };
  const entry = ia.find(e => e.id === rootId);

  let content;
  if (quote) {
    content = <QuoteDetail quote={quote} onBack={() => setQuote(null)} />;
  } else if (rootId === 'dashboard') {
    content = <Dashboard onNav={(id) => {
      const parent = ia.find(e => e.tabs?.some(t => t.id === id));
      if (parent) { setRootId(parent.id); setTabId(id); }
      else { navRoot(id); }
    }} />;
  } else if (entry?.tabs) {
    content = <TabbedPage entry={entry} activeTab={tabId} onTab={setTabId} ctx={ctx} />;
  } else {
    content = (
      <Page title={entry?.label || rootId}>
        <Layout><Layout.Section>{renderFeaturePage(rootId, ctx)}</Layout.Section></Layout>
      </Page>
    );
  }

  return (
    <AppProvider i18n={enTranslations}>
      <ShopifyShell ia={ia} currentRoot={rootId} onNavRoot={navRoot}>
        <Frame>{content}</Frame>
      </ShopifyShell>
    </AppProvider>
  );
}

createRoot(document.getElementById('root')).render(<App />);
